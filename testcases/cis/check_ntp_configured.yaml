id: TC-CIS-005
name: Verify NTP is configured
description: Validate that the switch has time synchronization configured for audit and log integrity.
feature: system
tags: [cis, smoke, system, security, monitoring]
severity: high
setup: []
validations:
  - name: NTP client mode is enabled
    type: regex
    command: show ntp status
    pattern: '(?i)Client mode\s*:\s*enabled'
  - name: NTP clock is synchronized
    type: regex
    command: show ntp status
    pattern: '(?i)Clock status\s*:\s*synchronized'
  - name: NTP server reference is present
    type: regex
    command: show ntp status
    pattern: '(?i)Server reference\s*:\s*\d{1,3}(?:\.\d{1,3}){3}'
cleanup: []
continue_on_failure: false
timeout: 60
